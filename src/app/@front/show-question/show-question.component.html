<app-nav></app-nav>

<div class="max-w-2xl mx-auto p-6">

  <!-- 卡片 -->
  <mat-card class="p-6">

    <mat-card-header>
      <mat-card-title class="text-2xl font-bold">
        問卷調查
      </mat-card-title>
      <mat-card-subtitle>
        未來修改說明文字
      </mat-card-subtitle>
    </mat-card-header>

    <mat-divider class="my-4"></mat-divider>

    <form class="flex flex-col gap-6">

      <!-- 簡答 -->
      <mat-form-field class="w-full">
        <mat-label>簡答題</mat-label>
        <input matInput name="easy" placeholder="請輸入內容">
      </mat-form-field>

      <!-- 單選 -->
      <div>
        <p class="font-semibold mb-2">性別</p>

        <mat-radio-group name="gender" class="flex gap-6">
          <mat-radio-button value="male">男</mat-radio-button>
          <mat-radio-button value="female">女</mat-radio-button>
        </mat-radio-group>
      </div>

      <!-- 多選 -->
      <div>
        <p class="font-semibold mb-2">興趣（可複選）</p>

        <div class="grid grid-cols-2 gap-3">
          <mat-checkbox value="sport">運動</mat-checkbox>
          <mat-checkbox value="music">音樂</mat-checkbox>
          <mat-checkbox value="game">遊戲</mat-checkbox>
        </div>
      </div>

      <!-- 送出 -->
      <button mat-raised-button color="primary" type="submit" class="w-full" (click)="preview()">
        送出問卷
      </button>

    </form>

  </mat-card>

</div>
