<h2 mat-dialog-title class="!text-lg !font-bold text-gray-800">新增問卷</h2>

<mat-dialog-content class="!pt-5 !px-6">
  <form class="flex flex-col gap-5">
    <!-- 基本資料區塊 -->
    <p class="text-xs font-bold tracking-widest text-gray-400 uppercase">
      基本資料
    </p>

    <!-- 標題 -->
    <mat-form-field class="w-full">
      <mat-label>標題</mat-label>
      <input
        matInput
        type="text"
        id="title"
        name="title"
        placeholder="請輸入問卷標題"
      />
    </mat-form-field>

    <!-- 說明 -->
    <mat-form-field class="w-full">
      <mat-label>說明</mat-label>
      <input
        matInput
        id="content"
        name="content"
        placeholder="請輸入問卷說明（選填）"
      />
    </mat-form-field>

    <!-- 日期並排 -->
    <div class="flex gap-3">
      <mat-form-field class="flex-1">
        <mat-label>開始日期</mat-label>
        <input
          matInput
          [matDatepicker]="startPicker"
          id="startDate"
          name="startDate"
        />
        <mat-datepicker-toggle matIconSuffix [for]="startPicker" />
        <mat-datepicker #startPicker />
      </mat-form-field>

      <mat-form-field class="flex-1">
        <mat-label>結束日期</mat-label>
        <input
          matInput
          [matDatepicker]="endPicker"
          id="endDate"
          name="endDate"
        />
        <mat-datepicker-toggle matIconSuffix [for]="endPicker" />
        <mat-datepicker #endPicker />
      </mat-form-field>
    </div>

    <mat-divider />

    <!-- 題目區塊 -->
    <div class="flex items-center justify-between">
      <p class="text-xs font-bold tracking-widest text-gray-400 uppercase">
        題目列表
      </p>
      <span class="text-xs text-gray-400">共 0 題</span>
    </div>

    <!-- 題目空白提示 -->
    <div
      class="flex flex-col items-center justify-center gap-2 border-2 border-dashed border-gray-200 rounded-2xl py-10 text-gray-400"
    >
      <mat-icon class="!text-4xl !w-10 !h-10 text-gray-300">quiz</mat-icon>
      <p class="text-sm">尚未新增任何題目</p>
    </div>

    <!-- 新增題目按鈕 -->
    <button
      mat-stroked-button
      type="button"
      class="w-full !rounded-xl !border-dashed !border-indigo-300 !text-indigo-500 hover:!bg-indigo-50"
    >
      <mat-icon>add</mat-icon>
      新增題目
    </button>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!px-6 !pb-5 gap-2">
  <button mat-stroked-button type="button" (click)="onclose()">取消</button>
  <button mat-flat-button color="primary" type="button">建立問卷</button>
</mat-dialog-actions>
