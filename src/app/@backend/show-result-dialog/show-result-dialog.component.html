<div mat-dialog-title class="flex items-center justify-between !border-b !pb-4">
  <div class="flex items-center gap-2">
    <mat-icon class="text-primary-600">person_search</mat-icon>
    <span class="!text-xl !font-bold text-gray-800">回答詳情回顧</span>
  </div>
  <!-- <button mat-icon-button mat-dialog-close><mat-icon>close</mat-icon></button> -->
</div>

<mat-dialog-content class="!pt-6 !px-8">
  <div class="grid grid-cols-2 gap-4 mb-8 p-5 bg-blue-50/50 border border-blue-100 rounded-2xl">
    <div class="space-y-1">
      <p class="text-xs text-blue-600 font-bold uppercase tracking-wider">姓名</p>
      <p class="text-gray-800 font-medium">{{ data.user?.name }}</p>
    </div>
    <div class="space-y-1">
      <p class="text-xs text-blue-600 font-bold uppercase tracking-wider">電話</p>
      <p class="text-gray-800 font-medium">{{ data.user?.phone }}</p>
    </div>
    <div class="space-y-1 col-span-2">
      <p class="text-xs text-blue-600 font-bold uppercase tracking-wider">電子郵件</p>
      <p class="text-gray-800 font-medium">{{ data.user?.email }}</p>
    </div>
  </div>

  <div class="space-y-6">
    <div class="flex items-center gap-2 mb-4">
      <div class="w-1 h-4 bg-primary-500 rounded-full"></div>
      <p class="text-sm font-bold text-gray-500 uppercase">問卷回答內容</p>
    </div>

    @for (ans of data.answersVos; track ans.questionId; let i = $index) {
    <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100 hover:border-primary-200 transition-colors">
      <div class="flex items-start gap-4">
        <span
          class="flex-none w-7 h-7 bg-white border border-gray-200 text-primary-600 text-xs flex items-center justify-center rounded-full font-black shadow-sm">
          {{ i + 1 }}
        </span>
        <div class="space-y-3 w-full">
          <p class="text-gray-800 font-bold text-base">{{ ans.questionTitle }}</p>

          <div class="space-y-2">
            @for (text of ans.answerList; track text) {
            <div class="flex items-center gap-2 p-3 bg-white border border-gray-200 rounded-xl">
              <mat-icon class="text-green-500 !text-sm w-4 h-4">check_circle</mat-icon>
              <span class="text-sm text-gray-700">{{ text }}</span>
            </div>
            }
          </div>
        </div>
      </div>
    </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end" class="!px-8 !pb-8">
  <button mat-flat-button color="primary" mat-dialog-close class="!px-8 !h-12 !rounded-xl">關閉視窗</button>
</mat-dialog-actions>
