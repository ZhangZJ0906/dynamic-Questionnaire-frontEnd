


<div class="w-2/3  mx-auto mt-3 ">
  <div class="flex flex-col md:flex-row gap-4 items-center mb-4">

    <mat-form-field class="w-full md:w-1/3">
      <mat-label>請輸入關鍵字</mat-label>
      <input matInput type="text" name="search" id="search" [(ngModel)]="inputData" (keyup)="searchTable($event)" />
    </mat-form-field>


    <mat-form-field class="w-50">
      <mat-label>開始日期</mat-label>
      <input matInput [matDatepicker]="startPicker" [(ngModel)]="startDate" (dateChange)="applyFilter()">
      <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
    </mat-form-field>
    ~
    <mat-form-field class="w-50">
      <mat-label>結束日期</mat-label>
      <input matInput [matDatepicker]="endPicker" [(ngModel)]="endDate" (dateChange)="applyFilter()">
      <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
    </mat-form-field>
    <button mat-stroked-button color="warn" class="h-[56px] px-6 whitespace-nowrap" (click)="resetFilters()">
      <mat-icon>refresh</mat-icon> reset
    </button>
  </div>


  <div class="mat-elevation-z8 overflow-x-auto ">
<div class="w-full mx-auto mt-3">
  <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 w-full">

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> 姓名 </th>
      <td mat-cell *matCellDef="let element"> {{ element.user?.name }} </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
      <td mat-cell *matCellDef="let element"> {{ element.user?.email }} </td>
    </ng-container>

    <ng-container matColumnDef="fillinDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> 填寫日期 </th>
      <td mat-cell *matCellDef="let element"> {{ element.fillinDate }} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> 詳細內容 </th>
      <td mat-cell *matCellDef="let element">
        <button mat-stroked-button color="primary" (click)="openDialog(element)">
          查看回答
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

</div>
<div class="grid justify-items-end hidden md:block ">
  <img src="image/Notebook.gif" alt="" class="w-50 h-50">
</div>
