<app-sidebar>
  <h1 class="text-3xl mb-10">問卷集合區</h1>

  <div class="flex flex-col sm:flex-row gap-3 sm:items-end bg-white p-4 rounded-xl shadow">
    <mat-form-field class="w-60">
      <mat-label>請輸入關鍵字</mat-label>
      <input matInput type="text" name="search" id="search" [(ngModel)]="inputData" (keyup)="searchTable($event)" />
    </mat-form-field>

    <button (click)="showNew()" mat-flat-button>
      <mat-icon>add</mat-icon>新增問卷
    </button>
  </div>

  <div class="mat-elevation-z8 w-full overflow-x-auto">
    <table mat-table matSort [dataSource]="dataSource">
      <!-- ID Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">No.</th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.id }}
        </td>
      </ng-container>

      <!-- 問卷名稱 Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">
          問卷名稱
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.title }}
        </td>
      </ng-container>



      <!-- 題目數 Column -->
      <ng-container matColumnDef="questionCount">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">
          題目數
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.questionCount }}
        </td>
      </ng-container>

      <!-- 開始日期 -->
      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="whitespace-nowrap">
          開始日期
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.startDate }}
        </td>
      </ng-container>

      <!-- 結束日期 -->
      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header class="whitespace-nowrap">
          結束日期
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.endDate }}
        </td>
      </ng-container>

      <!-- 狀態 Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">
          狀態
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.status }}
        </td>
      </ng-container>

      <!-- 回覆數 Column -->
      <ng-container matColumnDef="responseCount">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">
          回覆數
        </th>
        <td mat-cell *matCellDef="let element" class="whitespace-nowrap">
          {{ element.responseCount }}
        </td>
      </ng-container>

      <!-- 動作button -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="whitespace-nowrap">操作</th>
        <td mat-cell *matCellDef="let element">
          <div class="flex items-center gap-2 whitespace-nowrap py-2">
            @switch (element.status) {
            @case ("進行中") {
            <button mat-stroked-button color="primary" (click)="checkResult(element)">查看結果</button>
            
            }
            @case ("已結束") {
            <button mat-flat-button color="primary" (click)="checkResult(element)">查看結果</button>
            }
            }
            <button mat-flat-button color="accent" (click)="removequestionnaire(element)">
              刪除
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>
  </div>
</app-sidebar>
